<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>智慧小区管理系统 - 首页</title>
    <!-- 引入在线 Bootstrap CSS -->
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* 全屏背景图设置 (复用你 images 文件夹下的图片) */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 引用你刚加的图片作为首页背景 */
            background-image: url('images/3.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* 半透明遮罩，保证文字清晰 */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); /* 黑色半透明遮罩 */
            z-index: 0;
        }

        /* 入口卡片 */
        .entry-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.92);
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        .entry-title {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .entry-sub {
            color: #6c757d;
            margin-bottom: 30px;
        }

        .entry-card .btn {
            width: 80%;
            padding: 12px;
            font-size: 18px;
            margin: 10px 0;
            border-radius: 50px;
        }
    </style>
</head>
<body>

<!-- 背景遮罩层 -->
<div class="overlay"></div>

<!-- 主入口卡片 -->
<div class="entry-card">
    <div class="entry-title">🏡 智慧小区管理系统</div>
    <div class="entry-sub">Community Access System</div>
    <hr>

    <!-- 入口 1：管理员端 -->
    <a href="admin/index.html" class="btn btn-primary">
        🔐 管理员登录
    </a>

    <!-- 入口 2：业主端 -->
    <a href="owner/index.html" class="btn btn-success">
        👤 业主入口
    </a>

    <div class="mt-3">
        <small class="text-muted">门禁设备终端请前往 <a href="gate/device.html">Gate 设备</a></small>
    </div>
</div>

<!-- 引入 Bootstrap JS -->
<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
