<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业主服务中心 - 智慧小区</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../common/css/common.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .owner-card {
            max-width: 520px; width: 90%; padding: 50px 40px; background: #fff;
            border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center; animation: fadeInUp 0.5s ease-out;
        }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .owner-icon { font-size: 56px; margin-bottom: 15px; }
        .owner-title { font-size: 24px; font-weight: 700; color: #2D3748; margin-bottom: 8px; }
        .owner-sub { color: #718096; margin-bottom: 35px; font-size: 14px; }
        .menu-btn {
            display: block; width: 85%; padding: 16px; margin: 12px auto; border-radius: 50px;
            font-size: 16px; font-weight: 600; text-decoration: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: none; cursor: pointer; position: relative; overflow: hidden;
        }
        .menu-btn::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 0; height: 0; background: rgba(255,255,255,0.25);
            border-radius: 50%; transform: translate(-50%, -50%);
            transition: width 0.5s ease, height 0.5s ease;
        }
        .menu-btn:hover::after { width: 400px; height: 400px; }
        .menu-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.2); text-decoration: none; }
        .menu-btn:active { transform: translateY(0); }
        .btn-verify {
            background: #265F99; color: #fff;
        }
        .btn-profile {
            background: #265F99; color: #fff;
        }
        .divider { height: 1px; background: #E2E8F0; margin: 25px 0; }
        .back-link { margin-top: 20px; }
        .back-link a { color: #718096; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="owner-card">
    <div class="owner-icon">👤</div>
    <div class="owner-title">业主服务中心</div>
    <div class="owner-sub">请先进行身份核验，再查看或修改个人信息</div>

    <a href="verify.html" class="menu-btn btn-verify">📝 &nbsp;进入身份核验</a>

    <div class="divider"></div>
    <div class="back-link"><a href="../index.html">← 返回首页</a></div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
