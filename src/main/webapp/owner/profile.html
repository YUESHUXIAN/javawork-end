<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息 - 智慧小区</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../common/css/common.css">
</head>
<body class="form-page-body">

<div class="form-card">
    <div class="form-card-icon">👤</div>
    <div class="form-card-title">我的个人信息</div>

    <div id="infoBody">
        <p class="text-center text-muted py-4">正在加载数据...</p>
    </div>

    <div class="back-link">
        <a href="verify.html">← 返回核验页面</a>
        <a href="index.html">🏠 返回服务中心</a>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/axios/0.27.2/axios.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/js/bootstrap.bundle.min.js"></script>
<script src="../common/js/common.js"></script>
<script>
    $(document).ready(function() {
        axios.get('/owner/profile', {
            validateStatus: function(status) { return status < 500; }
        }).then(res => {
            let data = res.data;
            if(data.code === 401) {
                $("#infoBody").html(`
                    <div class="text-center py-4">
                        <p style="font-size:48px;">🔒</p>
                        <p style="font-size:16px; font-weight:600; color:#333;">尚未核验身份</p>
                        <p class="text-muted" style="font-size:13px; margin-bottom:15px;">${data.msg || '请先进行身份核验后再查看个人信息'}</p>
                        <a href="verify.html" class="btn btn-pill btn-pill-primary" style="width:auto; padding:10px 30px;">📝 去核验身份</a>
                    </div>`);
                return;
            }
            if(data.code && data.code !== 200) {
                $("#infoBody").html(`
                    <div class="text-center py-4">
                        <p style="font-size:48px;">⚠️</p>
                        <p class="text-danger">${data.msg || '获取信息失败'}</p>
                    </div>`);
                return;
            }

            let statusHtml = data.isConfirm == 1
                ? '<span class="badge badge-success">已审核</span>'
                : '<span class="badge badge-warning">待审核</span>';

            let html = `
                <div class="info-row"><div class="info-label">业主姓名</div><div class="info-value">${data.name || '-'}</div></div>
                <div class="info-row"><div class="info-label">身份证号</div><div class="info-value"><code>${data.idCard || '-'}</code></div></div>
                <div class="info-row"><div class="info-label">所属楼栋</div><div class="info-value">${data.buildId || '-'}</div></div>
                <div class="info-row"><div class="info-label">门牌号</div><div class="info-value">${data.roomNo || '<span class="text-muted">未设置</span>'}</div></div>
                <div class="info-row"><div class="info-label">手机号</div><div class="info-value">${data.phone || '<span class="text-muted">未设置</span>'}</div></div>
                <div class="info-row"><div class="info-label">门禁密码</div><div class="info-value">${data.entryPwd ? '••••••' : '<span class="text-muted">未设置</span>'}</div></div>
                <div class="info-row"><div class="info-label">审核状态</div><div class="info-value">${statusHtml}</div></div>
            `;
            $("#infoBody").html(html);
        }).catch(err => {
            console.error("加载个人信息失败:", err);
            $("#infoBody").html(`
                <div class="text-center py-4">
                    <p style="font-size:48px;">🌐</p>
                    <p class="text-danger">加载失败</p>
                    <p class="text-muted" style="font-size:12px;">${err.message || '请检查网络连接'}</p>
                </div>`);
        });
    });
</script>
</body>
</html>
