<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的个人信息</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../common/css/common.css">
</head>
<body>
<div class="container">
    <h3>👤 我的个人信息</h3>
    <hr>
    <div class="card">
        <div class="card-body" id="infoBody">
            <p class="text-center text-muted">正在加载数据...</p>
        </div>
    </div>
    <div class="mt-3">
        <a href="index.html" class="btn btn-secondary btn-sm">返回首页</a>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/axios/0.27.2/axios.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/js/bootstrap.bundle.min.js"></script>
<script>
    $(document).ready(function() {
        // 假设后端接口为 /owner/profile，GET 请求，获取当前登录业主信息
        axios.get('/owner/profile').then(res => {
            let data = res.data; // 假设返回的是一个 Owner 对象
            if(data.code && data.code !== 200) {
                $("#infoBody").html('<p class="text-danger">获取信息失败，请重新登录。</p>');
                return;
            }

            // 字段映射，需确保与你后端 Owner 实体类字段一致
            let statusHtml = data.isConfirm == 1 ?
                '<span class="badge badge-success">已审核</span>' :
                '<span class="badge badge-warning">待审核</span>';

            let html = `
                <div class="row"><div class="col-md-3 font-weight-bold">业主姓名：</div><div class="col-md-9">${data.name || '-'}</div></div><hr>
                <div class="row"><div class="col-md-3 font-weight-bold">身份证号：</div><div class="col-md-9">${data.idCard || '-'}</div></div><hr>
                <div class="row"><div class="col-md-3 font-weight-bold">所属楼栋ID：</div><div class="col-md-9">${data.buildId || '-'}</div></div><hr>
                <div class="row"><div class="col-md-3 font-weight-bold">门牌号：</div><div class="col-md-9">${data.roomNo || '-'}</div></div><hr>
                <div class="row"><div class="col-md-3 font-weight-bold">手机号：</div><div class="col-md-9">${data.phone || '-'}</div></div><hr>
                <div class="row"><div class="col-md-3 font-weight-bold">门禁密码：</div><div class="col-md-9">${data.entryPwd || '-'}</div></div><hr>
                <div class="row"><div class="col-md-3 font-weight-bold">审核状态：</div><div class="col-md-9">${statusHtml}</div></div>
            `;
            $("#infoBody").html(html);
        }).catch(err => {
            $("#infoBody").html('<p class="text-danger">网络异常，请稍后重试。</p>');
        });
    });
</script>
</body>
</html>
