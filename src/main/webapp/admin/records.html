<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>进出记录 - 智慧小区</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../common/css/common.css">
</head>
<body>

<!-- 导航栏 -->
<nav class="navbar navbar-expand-lg" style="background: linear-gradient(135deg, #667eea, #764ba2); padding: 12px 0;">
    <div class="container-fluid" style="max-width:1200px;">
        <a class="navbar-brand text-white font-weight-bold" href="#">🏘️ 智慧小区管理后台</a>
        <div class="navbar-nav ml-auto">
            <a class="nav-link text-white font-weight-bold" href="records.html">📊 进出记录</a>
            <a class="nav-link text-white-50" href="buiding.html">🏢 楼宇管理</a>
            <a class="nav-link text-white-50" href="owner.html">👥 业主管理</a>
            <a class="nav-link text-white-50" href="applyList.html">📋 申请审核</a>
            <a class="nav-link text-white-50" href="javascript:adminLogout()">🚪 退出</a>
        </div>
    </div>
</nav>

<div class="main-container">
    <div class="page-header">
        <h3>人员进出记录查询</h3>
        <button id="exportBtn" class="btn btn-info">📥 导出Excel</button>
    </div>

    <!-- 查询条件 -->
    <div class="search-bar">
        <div class="row align-items-end">
            <div class="col-md-3 mb-2">
                <label>姓名模糊查询</label>
                <input type="text" id="searchName" class="form-control" placeholder="输入姓名关键字">
            </div>
            <div class="col-md-3 mb-2">
                <label>进入开始时间</label>
                <input type="datetime-local" id="startTime" class="form-control">
            </div>
            <div class="col-md-3 mb-2">
                <label>进入结束时间</label>
                <input type="datetime-local" id="endTime" class="form-control">
            </div>
            <div class="col-md-3 mb-2">
                <label>&nbsp;</label>
                <div>
                    <button id="searchBtn" class="btn btn-primary">🔍 查询</button>
                    <button id="resetBtn" class="btn btn-secondary">↻ 重置</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 统计 -->
    <div class="mb-3 text-muted" id="resultCount" style="font-size:14px;"></div>

    <!-- 记录表格 -->
    <table class="table table-hover">
        <thead>
        <tr>
            <th>姓名</th>
            <th width="80">身份</th>
            <th>身份证号</th>
            <th>手机号</th>
            <th>进入时间</th>
            <th>离开时间</th>
            <th>临时密码</th>
        </tr>
        </thead>
        <tbody id="tableBody">
        <tr><td colspan="7" class="text-center text-muted py-4">请点击查询按钮搜索记录</td></tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/axios/0.27.2/axios.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/js/bootstrap.bundle.min.js"></script>
<script src="../common/js/common.js"></script>
<script>
    checkAdminLogin(); // 登录拦截

    $("#searchBtn").click(function(){
        let params = new URLSearchParams();
        params.append('name', $("#searchName").val());
        params.append('startTime', $("#startTime").val());
        params.append('endTime', $("#endTime").val());

        axios.post("/admin/queryRecord", params, {
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        }).then(res => {
            let data = res.data;
            if(data.code === 401) { alert(data.msg); window.location.href = 'index.html'; return; }
            let list = data.data;
            if(!list || list.length === 0) {
                $('#tableBody').html('<tr><td colspan="7" class="text-center text-muted py-4">未找到匹配的记录</td></tr>');
                $('#resultCount').text('');
                return;
            }
            let html = "";
            list.forEach(item => {
                let identity = item.isOwner == 1
                    ? '<span class="badge badge-success">业主</span>'
                    : '<span class="badge badge-info">访客</span>';
                html += `<tr>
                    <td><strong>${item.name}</strong></td>
                    <td>${identity}</td>
                    <td><code>${item.idCard || '-'}</code></td>
                    <td>${item.phone || '-'}</td>
                    <td>${item.enterTime || '-'}</td>
                    <td>${item.leaveTime || '<span class="text-muted">未离开</span>'}</td>
                    <td>${item.tempPwd ? '<code>' + item.tempPwd + '</code>' : '<span class="text-muted">-</span>'}</td>
                </tr>`;
            });
            $("#tableBody").html(html);
            $("#resultCount").text('共查询到 ' + list.length + ' 条记录');
        }).catch(() => { alert("网络错误，请稍后重试"); });
    });

    $("#resetBtn").click(function() {
        $("#searchName").val('');
        $("#startTime").val('');
        $("#endTime").val('');
        $("#tableBody").html('<tr><td colspan="7" class="text-center text-muted py-4">请点击查询按钮搜索记录</td></tr>');
        $("#resultCount").text('');
    });

    $("#exportBtn").click(function(){
        let name = $("#searchName").val();
        let s = $("#startTime").val();
        let e = $("#endTime").val();
        window.open(CTX + `/admin/export?name=${encodeURIComponent(name)}&startTime=${encodeURIComponent(s)}&endTime=${encodeURIComponent(e)}`);
    });
</script>
</body>
</html>
