<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理员登录</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../common/css/common.css">
</head>
<body class="container mt-5 w-50">
<h3 class="text-center">管理员登录（需U盾验证）</h3>
<hr>
<div class="mb-3">
    <label>管理员账号</label>
    <input type="text" id="username" class="form-control">
</div>
<div class="mb-3">
    <label>登录密码</label>
    <input type="password" id="password" class="form-control">
</div>
<div class="mb-3">
    <label>模拟U盘U盾编码</label>
    <input type="text" id="ukeyCode" class="form-control" placeholder="测试：UD2026001">
</div>
<button id="loginBtn" class="btn btn-primary w-100">登录系统</button>
<p id="loginMsg" class="mt-3 text-center"></p>
<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/axios/0.27.2/axios.min.js"></script>
<script>
    $("#loginBtn").click(function(){
        let loginData = {
            username: $("#username").val(),
            password: $("#password").val(),
            ukeyCode: $("#ukeyCode").val()
        }
        // 使用 URLSearchParams 将 JSON 数据转换为表单格式
        const params = new URLSearchParams();
        params.append('username', loginData.username);
        params.append('password', loginData.password);
        params.append('ukeyCode', loginData.ukeyCode);

        axios.post("/admin/login", params, {
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        }).then(res=>{
            let data = res.data;
            if(data.code === 200){
                alert("登录成功，跳转记录管理页");
                location.href = "records.html";
            }else{
                $("#loginMsg").text(data.msg).css("color", "red");
            }
        }).catch(err => {
            $("#loginMsg").text("网络错误，请稍后重试").css("color", "red");
        })
    })
</script>
</body>
</html>
