<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 智慧小区</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../common/css/common.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-card {
            max-width: 420px; width: 90%; padding: 40px; background: #fff;
            border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .login-icon { font-size: 48px; text-align: center; margin-bottom: 10px; }
        .login-title { text-align: center; font-weight: 700; color: #2D3748; margin-bottom: 30px; font-size: 22px; }
        .form-group label { font-weight: 500; color: #4A5568; font-size: 14px; }
        .btn-login {
            background: #265F99; color: #fff; border: none;
            border-radius: 50px; padding: 12px; font-size: 16px; font-weight: 600;
            width: 100%; margin-top: 10px; transition: all 0.3s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.4); color: #fff; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #718096; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-icon">🔐</div>
    <div class="login-title">管理员登录</div>

    <div class="form-group">
        <label>管理员账号</label>
        <input type="text" id="username" class="form-control" placeholder="请输入账号">
    </div>
    <div class="form-group">
        <label>登录密码</label>
        <input type="password" id="password" class="form-control" placeholder="请输入密码">
    </div>
    <div class="form-group">
        <label>U盾编码 <small class="text-muted">（模拟硬件验证）</small></label>
        <input type="text" id="ukeyCode" class="form-control" placeholder="测试：UD2026001">
    </div>

    <button id="loginBtn" class="btn btn-login">登 录</button>
    <p id="loginMsg" class="mt-3 text-center" style="min-height:20px;"></p>

    <div class="back-link"><a href="../index.html">← 返回首页</a></div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/axios/0.27.2/axios.min.js"></script>
<script src="../common/js/common.js"></script>
<script>
    $("#loginBtn").click(function(){
        let username = $("#username").val().trim();
        let password = $("#password").val().trim();
        let ukeyCode = $("#ukeyCode").val().trim();
        if(!username || !password || !ukeyCode) {
            $("#loginMsg").text("请填写完整登录信息").css("color", "#E53E3E");
            return;
        }

        $("#loginMsg").text("登录中...").css("color", "#888");

        const params = new URLSearchParams();
        params.append('username', username);
        params.append('password', password);
        params.append('ukeyCode', ukeyCode);

        axios.post(CTX + '/admin/login', params, { headers: { 'Content-Type': 'application/x-www-form-urlencoded' } }).then(res => {
            let data = res.data;
            if(data.code === 200) {
                sessionStorage.setItem('adminLoginTime', Date.now().toString());
                $("#loginMsg").text("✅ 登录成功，正在跳转...").css("color", "#38A169");
                setTimeout(() => { location.href = "records.html"; }, 600);
            } else {
                $("#loginMsg").text("❌ " + (data.msg || '登录失败')).css("color", "#E53E3E");
            }
        }).catch(err => {
            $("#loginMsg").text("❌ 连接服务器失败: " + (err.message || '')).css("color", "#E53E3E");
            console.error("登录错误:", err);
        });
    });
    $(document).keydown(function(e) { if(e.keyCode === 13) $("#loginBtn").click(); });
</script>
</body>
</html>
