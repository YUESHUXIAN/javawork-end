<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业主管理 - 智慧小区</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../common/css/common.css">
</head>
<body>

<!-- 导航栏 -->
<nav class="navbar navbar-expand-lg" style="background: linear-gradient(135deg, #667eea, #764ba2); padding: 12px 0;">
    <div class="container-fluid" style="max-width:1200px;">
        <a class="navbar-brand text-white font-weight-bold" href="#">🏘️ 智慧小区管理后台</a>
        <div class="navbar-nav ml-auto">
            <a class="nav-link text-white-50" href="records.html">📊 进出记录</a>
            <a class="nav-link text-white-50" href="buiding.html">🏢 楼宇管理</a>
            <a class="nav-link text-white font-weight-bold" href="owner.html">👥 业主管理</a>
            <a class="nav-link text-white-50" href="applyList.html">📋 申请审核</a>
            <a class="nav-link text-white-50" href="index.html">🚪 退出</a>
        </div>
    </div>
</nav>

<div class="main-container">
    <div class="page-header">
        <h3>业主信息管理</h3>
        <button class="btn btn-primary" data-toggle="modal" data-target="#ownerModal" onclick="openAddModal()">+ 初始化业主</button>
    </div>

    <table class="table table-hover">
        <thead>
        <tr>
            <th width="60">ID</th>
            <th>姓名</th>
            <th>身份证号</th>
            <th>所属楼宇</th>
            <th>房间号</th>
            <th>手机号</th>
            <th width="90">状态</th>
            <th width="160">操作</th>
        </tr>
        </thead>
        <tbody id="tableBody">
        <tr><td colspan="8" class="text-center text-muted py-4">加载中...</td></tr>
        </tbody>
    </table>
</div>

<!-- 新增/修改 模态框 -->
<div class="modal fade" id="ownerModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">初始化业主</h5>
                <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>业主姓名 <span class="text-danger">*</span></label>
                    <input type="text" id="ownerName" class="form-control" placeholder="请输入业主真实姓名">
                </div>
                <div class="form-group">
                    <label>身份证号 <span class="text-danger">*</span></label>
                    <input type="text" id="ownerIdCard" class="form-control" placeholder="请输入18位身份证号">
                </div>
                <div class="form-group">
                    <label>所属楼宇 <span class="text-danger">*</span></label>
                    <select id="ownerBuildId" class="form-control">
                        <option value="">请选择楼宇</option>
                    </select>
                </div>
                <div id="initTip" class="alert alert-info py-2" style="font-size:13px;">
                    💡 初始化后默认密码为 <strong>123456</strong>，业主需登录后修改信息并经审核才能使用门禁。
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="submitOwner()">保存</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/axios/0.27.2/axios.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/js/bootstrap.bundle.min.js"></script>
<script src="../common/js/common.js"></script>
<script>
    checkAdminLogin(); // 登录拦截

    const API_URL = '/admin/owner';
    let buildingMap = {}; // id -> name 映射

    $(document).ready(function() {
        loadBuildings(function() { loadOwners(); });
    });

    // 加载楼宇列表（下拉框用）- 使用公共API无需登录
    function loadBuildings(callback) {
        axios.get('/api/buildings').then(res => {
            let list = res.data;
            let options = '<option value="">请选择楼宇</option>';
            list.forEach(b => {
                buildingMap[b.id] = b.buildName;
                options += `<option value="${b.id}">${b.buildName}（${b.buildNo}）</option>`;
            });
            $('#ownerBuildId').html(options);
            if(callback) callback();
        }).catch(err => {
            console.error('加载楼宇列表失败:', err);
            if(callback) callback();
        });
    }

    // 加载业主列表
    function loadOwners() {
        axios.get(API_URL, { params: { action: 'list' } }).then(res => {
            let data = res.data;
            if(data.code === 401) { alert(data.msg); window.location.href = 'index.html'; return; }
            let list = data;
            if(list.length === 0) {
                $('#tableBody').html('<tr><td colspan="8" class="text-center text-muted py-4">暂无业主数据</td></tr>');
                return;
            }
            let html = '';
            list.forEach(item => {
                let statusHtml = item.isConfirm == 1
                    ? '<span class="badge badge-success">已确认</span>'
                    : '<span class="badge badge-warning">待确认</span>';
                let buildName = buildingMap[item.buildId] || ('ID:' + item.buildId);
                html += `<tr>
                    <td>${item.id}</td>
                    <td><strong>${item.name}</strong></td>
                    <td><code>${item.idCard}</code></td>
                    <td>${buildName}</td>
                    <td>${item.roomNo || '<span class="text-muted">-</span>'}</td>
                    <td>${item.phone || '<span class="text-muted">-</span>'}</td>
                    <td>${statusHtml}</td>
                    <td>
                        <button class="btn btn-sm btn-warning action-btn" onclick="openEditModal(${item.id}, '${item.name}', '${item.idCard}', ${item.buildId})">✏️ 修改</button>
                        <button class="btn btn-sm btn-danger action-btn" onclick="deleteOwner(${item.id})">🗑️ 删除</button>
                    </td>
                </tr>`;
            });
            $('#tableBody').html(html);
        }).catch(() => {
            $('#tableBody').html('<tr><td colspan="8" class="text-center text-danger py-4">加载失败</td></tr>');
        });
    }

    function openAddModal() {
        $('#modalTitle').text('初始化业主');
        $('#editId').val('');
        $('#ownerName').val('').prop('disabled', false);
        $('#ownerIdCard').val('').prop('disabled', false);
        $('#ownerBuildId').val('').prop('disabled', false);
        $('#initTip').show();
    }

    function openEditModal(id, name, idCard, buildId) {
        $('#modalTitle').text('修改业主信息');
        $('#editId').val(id);
        $('#ownerName').val(name);
        $('#ownerIdCard').val(idCard);
        $('#ownerBuildId').val(buildId);
        $('#ownerName, #ownerIdCard, #ownerBuildId').prop('disabled', false);
        $('#initTip').hide();
        $('#ownerModal').modal('show');
    }

    function submitOwner() {
        let id = $('#editId').val();
        let name = $('#ownerName').val().trim();
        let idCard = $('#ownerIdCard').val().trim();
        let buildId = $('#ownerBuildId').val();

        if(!name || !idCard || !buildId) {
            alert('请填写完整信息（姓名、身份证、楼宇为必填）');
            return;
        }

        let params = new URLSearchParams();
        params.append('action', id ? 'update' : 'addInit');
        if(id) params.append('id', id);
        params.append('name', name);
        params.append('idCard', idCard);
        params.append('buildId', buildId);

        axios.post(API_URL, params).then(res => {
            let data = res.data;
            if(data.code === 401) { alert(data.msg); window.location.href = 'index.html'; return; }
            if(data.code === 200) {
                alert(data.msg);
                $('#ownerModal').modal('hide');
                loadOwners();
            } else {
                alert(data.msg);
            }
        }).catch(() => { alert("网络错误，请稍后重试"); });
    }

    function deleteOwner(id) {
        if(!confirm('确定要删除该业主吗？删除后相关记录将无法恢复。')) return;
        let params = new URLSearchParams();
        params.append('action', 'delete');
        params.append('id', id);

        axios.post(API_URL, params).then(res => {
            let data = res.data;
            if(data.code === 401) { alert(data.msg); window.location.href = 'index.html'; return; }
            if(data.code === 200) { alert(data.msg); loadOwners(); }
            else { alert(data.msg); }
        }).catch(() => { alert("网络错误，请稍后重试"); });
    }
</script>
</body>
</html>
