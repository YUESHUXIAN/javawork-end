<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>楼宇管理 - 智慧小区</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../common/css/common.css">
</head>
<body>

<!-- 导航栏 -->
<nav class="navbar navbar-expand-lg" style="background: linear-gradient(135deg, #667eea, #764ba2); padding: 12px 0;">
    <div class="container-fluid" style="max-width:1200px;">
        <a class="navbar-brand text-white font-weight-bold" href="#">🏘️ 智慧小区管理后台</a>
        <div class="navbar-nav ml-auto">
            <a class="nav-link text-white-50" href="records.html">📊 进出记录</a>
            <a class="nav-link text-white font-weight-bold" href="buiding.html">🏢 楼宇管理</a>
            <a class="nav-link text-white-50" href="owner.html">👥 业主管理</a>
            <a class="nav-link text-white-50" href="applyList.html">📋 申请审核</a>
            <a class="nav-link text-white-50" href="index.html">🚪 退出</a>
        </div>
    </div>
</nav>

<div class="main-container">
    <div class="page-header">
        <h3>楼宇信息管理</h3>
        <button class="btn btn-primary" data-toggle="modal" data-target="#buildingModal" onclick="openAddModal()">+ 新增楼宇</button>
    </div>

    <table class="table table-hover">
        <thead>
        <tr>
            <th width="80">ID</th>
            <th>楼宇名称</th>
            <th>楼宇编号</th>
            <th width="180">操作</th>
        </tr>
        </thead>
        <tbody id="tableBody">
        <tr><td colspan="4" class="text-center text-muted py-4">加载中...</td></tr>
        </tbody>
    </table>
</div>

<!-- 新增/修改 模态框 -->
<div class="modal fade" id="buildingModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">新增楼宇</h5>
                <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>楼宇名称</label>
                    <input type="text" id="buildName" class="form-control" placeholder="例如：A栋">
                </div>
                <div class="form-group">
                    <label>楼宇编号 <small class="text-muted">（需唯一）</small></label>
                    <input type="text" id="buildNo" class="form-control" placeholder="例如：A-001">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="submitBuilding()">保存</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/axios/0.27.2/axios.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/js/bootstrap.bundle.min.js"></script>
<script src="../common/js/common.js"></script>
<script>
    checkAdminLogin(); // 登录拦截

    const API_URL = '/admin/building';

    $(document).ready(function() { loadBuildings(); });

    function loadBuildings() {
        axios.get(API_URL, { params: { action: 'list' } }).then(res => {
            let data = res.data;
            if(data.code === 401) { alert(data.msg); window.location.href = 'index.html'; return; }
            let list = data;
            if(list.length === 0) {
                $('#tableBody').html('<tr><td colspan="4" class="text-center text-muted py-4">暂无楼宇数据，请点击上方按钮新增</td></tr>');
                return;
            }
            let html = '';
            list.forEach(item => {
                html += `<tr>
                    <td>${item.id}</td>
                    <td><strong>${item.buildName}</strong></td>
                    <td><code>${item.buildNo}</code></td>
                    <td>
                        <button class="btn btn-sm btn-warning action-btn" onclick="openEditModal(${item.id}, '${item.buildName}', '${item.buildNo}')">✏️ 修改</button>
                        <button class="btn btn-sm btn-danger action-btn" onclick="deleteBuilding(${item.id})">🗑️ 删除</button>
                    </td>
                </tr>`;
            });
            $('#tableBody').html(html);
        }).catch(() => {
            $('#tableBody').html('<tr><td colspan="4" class="text-center text-danger py-4">加载失败，请检查网络</td></tr>');
        });
    }

    function openAddModal() {
        $('#modalTitle').text('新增楼宇');
        $('#editId').val('');
        $('#buildName').val('');
        $('#buildNo').val('');
    }

    function openEditModal(id, name, no) {
        $('#modalTitle').text('修改楼宇');
        $('#editId').val(id);
        $('#buildName').val(name);
        $('#buildNo').val(no);
        $('#buildingModal').modal('show');
    }

    function submitBuilding() {
        let id = $('#editId').val();
        let name = $('#buildName').val().trim();
        let no = $('#buildNo').val().trim();
        if(!name || !no) { alert('请填写完整信息'); return; }

        let params = new URLSearchParams();
        params.append('action', id ? 'update' : 'add');
        params.append('id', id);
        params.append('buildName', name);
        params.append('buildNo', no);

        axios.post(API_URL, params).then(res => {
            let data = res.data;
            if(data.code === 401) { alert(data.msg); window.location.href = 'index.html'; return; }
            if(data.code === 200) {
                alert(data.msg);
                $('#buildingModal').modal('hide');
                loadBuildings();
            } else {
                alert(data.msg);
            }
        }).catch(() => { alert("网络错误，请稍后重试"); });
    }

    function deleteBuilding(id) {
        if(!confirm('确定要删除这条楼宇记录吗？')) return;
        let params = new URLSearchParams();
        params.append('action', 'delete');
        params.append('id', id);

        axios.post(API_URL, params).then(res => {
            let data = res.data;
            if(data.code === 401) { alert(data.msg); window.location.href = 'index.html'; return; }
            if(data.code === 200) { alert(data.msg); loadBuildings(); }
            else { alert(data.msg); }
        }).catch(() => { alert("网络错误，请稍后重试"); });
    }
</script>
</body>
</html>
