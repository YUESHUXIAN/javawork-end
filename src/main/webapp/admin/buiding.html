<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>小区楼宇管理</title>
    <!-- 使用在线CDN的 Bootstrap 样式 -->
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { background: #fff; padding: 20px; margin-top: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .action-btn { margin-right: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>楼宇信息管理</h3>
        <button class="btn btn-primary" data-toggle="modal" data-target="#buildingModal" onclick="openAddModal()">+ 新增楼宇</button>
    </div>

    <table class="table table-bordered table-hover">
        <thead class="thead-light">
        <tr>
            <th>ID</th>
            <th>楼宇名称</th>
            <th>楼宇编号</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody id="tableBody">
        <!-- 数据由 JS 渲染 -->
        </tbody>
    </table>
</div>

<!-- 新增/修改 模态框 -->
<div class="modal fade" id="buildingModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">新增楼宇</h5>
                <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>楼宇名称：</label>
                    <input type="text" id="buildName" class="form-control" placeholder="例如：A栋">
                </div>
                <div class="form-group">
                    <label>楼宇编号：</label>
                    <input type="text" id="buildNo" class="form-control" placeholder="例如：A-001 (需唯一)">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="submitBuilding()">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- 引入在线 jQuery 和 Axios -->
<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/axios/0.27.2/axios.min.js"></script>
<!-- 引入 Bootstrap JS (依赖于 jQuery) -->
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/js/bootstrap.bundle.min.js"></script>

<script>
    const API_URL = '/admin/building';

    $(document).ready(function() {
        loadBuildings();
    });

    function loadBuildings() {
        axios.get(API_URL, { params: { action: 'list' } }).then(res => {
            let data = res.data;
            // 检查是否返回401未登录
            if(data.code === 401) {
                alert(data.msg);
                window.location.href = 'index.html';
                return;
            }
            let list = data;
            let html = '';
            list.forEach(item => {
                html += `<tr>
                            <td>${item.id}</td>
                            <td>${item.buildName}</td>
                            <td>${item.buildNo}</td>
                            <td>
                                <button class="btn btn-sm btn-warning action-btn" onclick="openEditModal(${item.id}, '${item.buildName}', '${item.buildNo}')">修改</button>
                                <button class="btn btn-sm btn-danger action-btn" onclick="deleteBuilding(${item.id})">删除</button>
                            </td>
                         </tr>`;
            });
            $('#tableBody').html(html);
        }).catch(err => alert('加载列表失败！'));
    }

    // 2. 打开新增弹窗
    function openAddModal() {
        $('#modalTitle').text('新增楼宇');
        $('#editId').val('');
        $('#buildName').val('');
        $('#buildNo').val('');
    }

    // 3. 打开修改弹窗
    function openEditModal(id, name, no) {
        $('#modalTitle').text('修改楼宇');
        $('#editId').val(id);
        $('#buildName').val(name);
        $('#buildNo').val(no);
        $('#buildingModal').modal('show');
    }

    // 4. 提交新增/修改
    function submitBuilding() {
        let id = $('#editId').val();
        let name = $('#buildName').val();
        let no = $('#buildNo').val();
        if(!name || !no) { alert('请填写完整信息'); return; }

        let params = new URLSearchParams();
        params.append('action', id ? 'update' : 'add');
        params.append('id', id);
        params.append('buildName', name);
        params.append('buildNo', no);

        axios.post(API_URL, params).then(res => {
            let data = res.data; // 假设后端返回 JSON {code: 200, msg: '...'}
            if(data.code === 401) {
                alert(data.msg);
                window.location.href = 'index.html';
                return;
            }
            if(data.code === 200) {
                alert(data.msg);
                $('#buildingModal').modal('hide');
                loadBuildings(); // 刷新列表
            } else {
                alert(data.msg); // 显示”楼宇编号已存在”
            }
        }).catch(() => {
            alert(“网络错误，请稍后重试”);
        });
    }

    // 5. 删除
    function deleteBuilding(id) {
        if(!confirm('确定要删除这条记录吗？')) return;
        let params = new URLSearchParams();
        params.append('action', 'delete');
        params.append('id', id);

        axios.post(API_URL, params).then(res => {
            let data = res.data;
            if(data.code === 401) {
                alert(data.msg);
                window.location.href = 'index.html';
                return;
            }
            if(data.code === 200) {
                alert(data.msg);
                loadBuildings();
            } else {
                alert(data.msg);
            }
        }).catch(() => {
            alert("网络错误，请稍后重试");
        });
    }
</script>
</body>
</html>
