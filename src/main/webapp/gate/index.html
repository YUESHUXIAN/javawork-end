<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>门禁终端 - 智慧小区</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../common/css/common.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .gate-card {
            max-width: 460px; width: 90%; padding: 50px 40px; background: #fff;
            border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center; animation: fadeInUp 0.5s ease-out;
        }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .gate-icon { font-size: 56px; margin-bottom: 15px; }
        .gate-title { font-size: 24px; font-weight: 700; color: #2D3748; margin-bottom: 8px; }
        .gate-sub { color: #718096; margin-bottom: 30px; font-size: 14px; }
        .btn-gate-main {
            display: block; width: 85%; padding: 16px; margin: 10px auto; border-radius: 50px;
            font-size: 18px; font-weight: 600; transition: all 0.3s; border: none;
            background: #38A169; color: #fff;
        }
        .btn-gate-main:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(67,233,123,0.4); color: #fff; }
        .divider { height: 1px; background: #E2E8F0; margin: 25px 0; }
        .back-link a { color: #718096; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="gate-card">
    <div class="gate-icon">🚪</div>
    <div class="gate-title">小区门禁终端</div>
    <div class="gate-sub">请选择通行类型，业主需密码，访客需登记</div>

    <a href="device.html" class="btn-gate-main">🚪 &nbsp;进入 / 离开 小区</a>

    <div class="divider"></div>
    <div class="back-link"><a href="../index.html">← 返回首页</a></div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
