<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>小区门禁系统 - 入口</title>

    <!-- 引入在线 Bootstrap CSS -->
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- 引入本地公共 CSS (包含背景图片配置) -->
    <link rel="stylesheet" href="../common/css/common.css">

    <!-- 针对这个入口页面的额外美化 -->
    <style>
        /* 让卡片垂直居中于屏幕中央 */
        .gate-wrapper {
            min-height: 80vh; /* 占据屏幕高度的80% */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 门禁入口大卡片 */
        .gate-card {
            max-width: 500px;
            width: 100%;
            padding: 40px;
            border-radius: 12px;
            border: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); /* 更明显的阴影 */
            background-color: rgba(255, 255, 255, 0.95); /* 微微透明白底 */
            text-align: center;
        }

        .gate-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 30px;
        }

        .gate-card .btn {
            width: 80%; /* 按钮占卡片的80%宽 */
            padding: 12px 0;
            font-size: 18px;
            margin-bottom: 15px;
            border-radius: 50px; /* 胶囊按钮 */
            transition: all 0.3s;
        }

        .gate-card .btn:hover {
            transform: translateY(-3px); /* 鼠标悬停轻微上浮效果 */
        }
    </style>
</head>
<body>

<div class="container gate-wrapper">
    <div class="gate-card">
        <!-- 如果有logo可以放在这，比如 <img src="../images/logo.png" width="60"> -->
        <div class="gate-title">🏠 小区门禁终端</div>
        <p class="text-muted mb-4">请选择您的通行类型</p>

        <!-- 核心入口：点击跳转到 device.html -->
        <a href="device.html" class="btn btn-success">
            🚪 进入 / 离开 小区
        </a>

        <div class="mt-3 text-muted" style="font-size: 14px;">
            <hr>
            <span>业主请携带密码，访客请携带临时密码</span>
        </div>
    </div>
</div>

<!-- 引入在线 JS 资源 -->
<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/js/bootstrap.bundle.min.js"></script>

<!-- 页面加载后若有额外效果可写在这里 -->
<script>
    $(document).ready(function() {
        console.log("门禁入口页面已加载");
    });
</script>
</body>
</html>
