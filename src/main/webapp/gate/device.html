<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>门禁设备终端 - 智慧小区</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../common/css/common.css">
    <style>
        .gate-page-body {
            display: flex; align-items: flex-start; justify-content: center;
            min-height: 100vh; margin: 0; padding: 30px 15px;
        }
    </style>
</head>
<body class="gate-page-body">

<div class="gate-card">
    <div class="gate-header">
        <h3>🏘️ 小区门禁终端</h3>
        <p>Community Gate Access Terminal</p>
    </div>

    <div class="gate-body">
        <!-- 身份选择 -->
        <div class="gate-mode-tabs">
            <button class="gate-mode-tab active" onclick="switchMode('owner', this)">👤 业主</button>
            <button class="gate-mode-tab" onclick="switchMode('visitor', this)">🚶 访客</button>
        </div>

        <!-- 进出选择 -->
        <div class="gate-action-tabs">
            <button class="gate-action-tab active" onclick="switchAction('enter', this)">🚪 进入小区</button>
            <button class="gate-action-tab leave" onclick="switchAction('leave', this)">🚶 离开小区</button>
        </div>

        <!-- ========== 业主进入 ========== -->
        <div class="gate-section active" id="ownerEnter">
            <div class="form-group">
                <label>业主姓名</label>
                <input type="text" id="oeName" class="form-control" placeholder="请输入姓名">
            </div>
            <div class="form-group">
                <label>门禁密码</label>
                <input type="password" id="oePwd" class="form-control" placeholder="请输入门禁密码">
            </div>
            <button class="btn btn-pill btn-pill-success" onclick="ownerEnter()">🔓 验证并开门</button>
        </div>

        <!-- ========== 业主离开 ========== -->
        <div class="gate-section" id="ownerLeave">
            <div class="form-group">
                <label>业主姓名</label>
                <input type="text" id="olName" class="form-control" placeholder="请输入姓名">
            </div>
            <div class="form-group">
                <label>门禁密码</label>
                <input type="password" id="olPwd" class="form-control" placeholder="请输入门禁密码">
            </div>
            <button class="btn btn-pill btn-pill-danger" onclick="ownerLeave()">🔒 验证并离开</button>
        </div>

        <!-- ========== 访客进入 ========== -->
        <div class="gate-section" id="visitorEnter">
            <div class="form-group">
                <label>访客姓名 <span class="text-danger">*</span></label>
                <input type="text" id="veName" class="form-control" placeholder="请输入您的姓名">
            </div>
            <div class="form-group">
                <label>身份证号</label>
                <input type="text" id="veIdCard" class="form-control" placeholder="可选填">
            </div>
            <div class="form-group">
                <label>手机号</label>
                <input type="text" id="vePhone" class="form-control" placeholder="可选填">
            </div>

            <button class="btn btn-pill btn-pill-success" id="visitorRegisterBtn" onclick="visitorRegister()">📋 登记并获取密码</button>

            <!-- 临时密码显示区 -->
            <div class="temp-pwd-box" id="tempPwdBox">
                <div class="temp-pwd-label">您的临时门禁密码（请妥善保管）</div>
                <div class="temp-pwd-value" id="tempPwdDisplay">-</div>
            </div>

            <div style="margin-top:15px;">
                <button class="btn btn-pill btn-pill-info" onclick="visitorEnter()">🔓 使用临时密码开门</button>
            </div>
        </div>

        <!-- ========== 访客离开 ========== -->
        <div class="gate-section" id="visitorLeave">
            <div class="form-group">
                <label>临时密码</label>
                <input type="text" id="vlTempPwd" class="form-control" placeholder="请输入系统生成的临时密码">
            </div>
            <button class="btn btn-pill btn-pill-danger" onclick="visitorLeave()">🔒 验证并离开</button>
        </div>

        <!-- 结果提示 -->
        <div class="result-box" id="resultBox"></div>

        <div class="back-link"><a href="../index.html">← 返回首页</a></div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/axios/0.27.2/axios.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/js/bootstrap.bundle.min.js"></script>
<script src="../common/js/common.js"></script>
<script>
    let currentMode = 'owner';
    let currentAction = 'enter';

    function switchMode(mode, el) {
        currentMode = mode;
        $('.gate-mode-tab').removeClass('active');
        $(el).addClass('active');
        updateSections();
    }

    function switchAction(action, el) {
        currentAction = action;
        $('.gate-action-tab').removeClass('active');
        $(el).addClass('active');
        updateSections();
    }

    function updateSections() {
        $('.gate-section').removeClass('active');
        $('#resultBox').hide();
        if(currentMode === 'owner' && currentAction === 'enter') $('#ownerEnter').addClass('active');
        else if(currentMode === 'owner' && currentAction === 'leave') $('#ownerLeave').addClass('active');
        else if(currentMode === 'visitor' && currentAction === 'enter') $('#visitorEnter').addClass('active');
        else if(currentMode === 'visitor' && currentAction === 'leave') $('#visitorLeave').addClass('active');
    }

    function showResult(type, msg) {
        let box = $('#resultBox');
        box.removeClass('result-success result-error result-warn');
        if(type === 'success') box.addClass('result-success');
        else if(type === 'error') box.addClass('result-error');
        else box.addClass('result-warn');
        box.text(msg).show();
    }

    // 业主进入
    function ownerEnter() {
        let name = $('#oeName').val().trim();
        let pwd = $('#oePwd').val().trim();
        if(!name || !pwd) { showResult('error', '请输入姓名和密码'); return; }

        let params = new URLSearchParams();
        params.append('name', name);
        params.append('pwd', pwd);
        params.append('isOwner', '1');
        params.append('action', 'enter');

        axios.post('/gate/check', params, { headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, validateStatus: function(s){return s<500;} })
        .then(res => {
            let data = res.data;
            if(data.code == 200) showResult('success', '✅ ' + data.msg);
            else if(data.code == 502) showResult('warn', '⚠️ ' + data.msg);
            else if(data.code == 503) showResult('warn', '⚠️ ' + data.msg);
            else showResult('error', '❌ ' + (data.msg || '验证失败'));
        }).catch(err => { showResult('error', '连接失败: ' + (err.message || '请检查服务器')); });
    }

    // 业主离开
    function ownerLeave() {
        let name = $('#olName').val().trim();
        let pwd = $('#olPwd').val().trim();
        if(!name || !pwd) { showResult('error', '请输入姓名和密码'); return; }

        let params = new URLSearchParams();
        params.append('name', name);
        params.append('pwd', pwd);
        params.append('isOwner', '1');
        params.append('action', 'leave');

        axios.post('/gate/check', params, { headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, validateStatus: function(s){return s<500;} })
        .then(res => {
            let data = res.data;
            if(data.code == 200) showResult('success', '✅ ' + data.msg);
            else if(data.code == 503) showResult('warn', '⚠️ ' + data.msg);
            else showResult('error', '❌ ' + data.msg);
        }).catch(err => { showResult('error', '连接失败: ' + (err.message || '请检查服务器')); });
    }

    // 访客登记
    function visitorRegister() {
        let name = $('#veName').val().trim();
        if(!name) { showResult('error', '请输入访客姓名'); return; }

        let params = new URLSearchParams();
        params.append('name', name);
        params.append('idCard', $('#veIdCard').val().trim());
        params.append('phone', $('#vePhone').val().trim());
        params.append('action', 'visitorRegister');

        axios.post('/gate/check', params, { headers: { 'Content-Type': 'application/x-www-form-urlencoded' } })
        .then(res => {
            let data = res.data;
            if(data.code == 200) {
                $('#tempPwdDisplay').text(data.tempPwd);
                $('#tempPwdBox').show();
                showResult('success', '✅ ' + data.msg);
            } else {
                showResult('error', '❌ ' + data.msg);
            }
        }).catch(err => { showResult('error', '连接失败: ' + (err.message || '请检查服务器')); });
    }

    // 访客用临时密码进门
    function visitorEnter() {
        let name = $('#veName').val().trim();
        let tempPwd = $('#tempPwdDisplay').text();
        if(!name) { showResult('error', '请输入姓名'); return; }
        if(tempPwd === '-' || !tempPwd) { showResult('error', '请先登记获取临时密码'); return; }

        let params = new URLSearchParams();
        params.append('name', name);
        params.append('tempPwd', tempPwd);
        params.append('isOwner', '0');
        params.append('action', 'enter');

        axios.post('/gate/check', params, { headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, validateStatus: function(s){return s<500;} })
        .then(res => {
            let data = res.data;
            if(data.code == 200) showResult('success', '✅ ' + data.msg);
            else if(data.code == 503) showResult('warn', '⚠️ ' + data.msg);
            else showResult('error', '❌ ' + data.msg);
        }).catch(err => { showResult('error', '连接失败: ' + (err.message || '请检查服务器')); });
    }

    // 访客离开
    function visitorLeave() {
        let tempPwd = $('#vlTempPwd').val().trim();
        if(!tempPwd) { showResult('error', '请输入临时密码'); return; }

        let params = new URLSearchParams();
        params.append('tempPwd', tempPwd);
        params.append('isOwner', '0');
        params.append('action', 'leave');

        axios.post('/gate/check', params, { headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, validateStatus: function(s){return s<500;} })
        .then(res => {
            let data = res.data;
            if(data.code == 200) showResult('success', '✅ ' + data.msg);
            else if(data.code == 503) showResult('warn', '⚠️ ' + data.msg);
            else showResult('error', '❌ ' + data.msg);
        }).catch(err => { showResult('error', '连接失败: ' + (err.message || '请检查服务器')); });
    }
</script>
</body>
</html>
