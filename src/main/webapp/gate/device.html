<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>小区门禁设备</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../common/css/common.css">
</head>
<body class="container mt-5">
<h3>业主进门验证</h3>
<hr>
<div class="row mb-3">
    <label class="col-2">业主姓名：</label>
    <div class="col-4">
        <input type="text" id="gName" class="form-control">
    </div>
</div>
<div class="row mb-3">
    <label class="col-2">门禁密码：</label>
    <div class="col-4">
        <input type="password" id="gPwd" class="form-control">
    </div>
</div>
<hr>
<div class="row mb-3">
    <div class="col-2">身份选择：</div>
    <div class="col-4">
        <select id="identitySel" class="form-control">
            <option value="1">业主</option>
            <option value="0">访客</option>
        </select>
    </div>
</div>

<div id="visitorDiv" style="display:none;"> <!-- 访客专属区域 -->
    <div class="row mb-3">
        <div class="col-2">身份证：</div>
        <div class="col-4"><input type="text" id="vIdCard" class="form-control"></div>
    </div>
    <div class="row mb-3">
        <div class="col-2">手机号：</div>
        <div class="col-4"><input type="text" id="vPhone" class="form-control"></div>
    </div>
    <div class="row mb-3">
        <div class="col-2">来访事由：</div>
        <div class="col-4"><input type="text" id="vReason" class="form-control"></div>
    </div>
    <div class="row mb-3">
        <div class="col-2">系统生成密码：</div>
        <div class="col-4"><input type="text" id="vTempPwd" class="form-control" readonly></div>
    </div>
    <button id="genPwdBtn" class="btn btn-warning">生成密码并记录进入</button>
</div>
<button id="openDoor" class="btn btn-success">开门验证</button>
<p id="tipMsg" class="mt-3 fs-5"></p>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/axios/0.27.2/axios.min.js"></script>
<script>
$("#identitySel").change(function(){
    if($(this).val() == "0"){
        $("#visitorDiv").show();
        $("#gName, #gPwd").parent().parent().hide(); // 隐藏业主输入框
    } else {
        $("#visitorDiv").hide();
        $("#gName, #gPwd").parent().parent().show(); // 显示业主输入框
    }
});
$("#genPwdBtn").click(function(){
    let params = {
        name: $("#gName").val(), // 复用姓名框
        idCard: $("#vIdCard").val(),
        phone: $("#vPhone").val(),
        reason: $("#vReason").val()
    };
    axios.post("/gate/visitorEnter", params).then(res=>{
        let data = res.data;
        if(data.code == 200){
            $("#vTempPwd").val(data.pwd); // 后端返回生成的密码
            alert("登记成功，请记住此密码开门！");
        } else {
            alert(data.msg);
        }
    });
});
$("#openDoor").click(function(){
    let isOwner = $("#identitySel").val();
    let pwd = isOwner == "1" ? $("#gPwd").val() : $("#vTempPwd").val(); // 访客用生成的密码
    let data = {
        name: $("#gName").val(),
        pwd: pwd,
        isOwner: isOwner
    };
    axios.post("/gate/check", data).then(res=>{ ...原逻辑... });
});
</script>
</body>
</html>
